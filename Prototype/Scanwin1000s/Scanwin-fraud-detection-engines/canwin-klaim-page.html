    <!-- Interactive Script -->
    <script>
        // Countdown Timer Logic (04:59)
        let totalSeconds = 4 * 60 + 59;
        const timerDisplay = document.getElementById('timerDisplay');

        const countdownInterval = setInterval(() => {
            if (totalSeconds <= 0) {
                clearInterval(countdownInterval);
                timerDisplay.textContent = "00:00";
                timerDisplay.style.color = "#999999";
                alert("Kode ScanWin telah hangus. Silakan buat kode baru.");
                return;
            }
            totalSeconds--;
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            timerDisplay.textContent =
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }, 1000);

        function handleBackToHome() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ action: 'GOTO_HOMEPAGE' }, '*');
            } else {
                window.location.href = 'scanwin-homepage.html';
            }
        }

        function triggerQrUpload(e) {
            if (e && e.stopPropagation) e.stopPropagation();
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ action: 'UPLOAD_QR_SUCCESS', fileName: 'ScanWin_QR_WhatsApp_Bulk.png' }, '*');
            } else {
                const fileInput = document.getElementById('qrFileInput');
                if (fileInput) fileInput.click();
            }
        }

        // Upload Handler with Parent Prototype PostMessage Support
        function handleQrUpload(input) {
            if (input.files && input.files[0]) {
                const fileName = input.files[0].name;
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ action: 'UPLOAD_QR_SUCCESS', fileName: fileName }, '*');
                } else {
                    alert('Foto QR "' + fileName + '" berhasil diunggah! Memproses verifikasi sCanWin...');
                }
            }
        }
