        function handleReupload() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function (e) {
                if (e.target.files && e.target.files[0]) {
                    alert('Memproses foto QR baru: ' + e.target.files[0].name);
                    window.location.href = 'scanwin-success-redeem-page.html';
                }
            };
            input.click();
        }
