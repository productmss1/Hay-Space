    <!-- Interactive Voucher Carousel Script -->
    <script>
        const allVouchersData = [
            { id: "VCR/01002/19292", amount: "IDR 200.000!", store: "Dari Pembelian GRC Board di Toko Semesta Abadi" },
            { id: "VCR/01002/19293", amount: "IDR 150.000!", store: "Dari Pembelian Semen TR-30 di Toko Maju Jaya" },
            { id: "VCR/01002/19294", amount: "IDR 100.000!", store: "Dari Pembelian Cat Dulux di Toko Bangunan Sentosa" },
            { id: "VCR/01002/19295", amount: "IDR 500.000!", store: "Super Jackpot Bonus ScanWin 1000s" }
        ];

        let vouchersData = [...allVouchersData];
        let currentIndex = 0;

        function handleNextVoucher() {
            if (currentIndex < vouchersData.length - 1) {
                currentIndex++;
                updateVoucherDisplay();
            } else {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ action: 'GOTO_HOMEPAGE' }, '*');
                } else {
                    window.location.href = "scanwin-homepage.html";
                }
            }
        }

        function updateVoucherDisplay() {
            const current = vouchersData[currentIndex] || vouchersData[0];
            document.getElementById('prizeAmountDisplay').textContent = current.amount;
            document.getElementById('storeInfoDisplay').textContent = current.store;
            document.getElementById('voucherIdDisplay').textContent = current.id;
            document.getElementById('counterDisplay').textContent = `Voucher ${currentIndex + 1}/${vouchersData.length}`;

            // Button logic: 'Ke Detail Saldo' if single voucher or on last voucher, else 'Voucher Selanjutnya'
            if (vouchersData.length === 1 || currentIndex === vouchersData.length - 1) {
                document.getElementById('btnTextDisplay').textContent = "Ke Detail Saldo";
            } else {
                document.getElementById('btnTextDisplay').textContent = "Voucher Selanjutnya";
            }
        }

        // Listen for parent postMessage to switch between 1 Voucher and 4 Vouchers mode
        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'SET_VOUCHER_COUNT') {
                const count = event.data.count || 4;
                if (count === 1) {
                    vouchersData = [allVouchersData[0]];
                } else {
                    vouchersData = [...allVouchersData];
                }
                currentIndex = 0;
                updateVoucherDisplay();
            }
        });

        // Initialize button text on page load
        updateVoucherDisplay();
    </script>
